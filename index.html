<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #e5e5e5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ID CARD */
.id-card {
  width: 700px;
  height: 260px;
  background: linear-gradient(135deg, #1e1e1e, #444);
  color: #fff;
  border-radius: 15px;
  display: flex;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* LEFT SIDE (PHOTO) */
.left {
  width: 30%;
  text-align: center;
  border-right: 2px solid rgba(255,255,255,0.2);
}

.left img {
  width: 130px;
  height: 130px;
  border-radius: 10px;
  object-fit: cover;
  margin-top: 10px;
  border: 3px solid #fff;
}

.id-number {
  margin-top: 10px;
  font-size: 13px;
  letter-spacing: 2px;
}

/* RIGHT SIDE */
.right {
  width: 70%;
  padding-left: 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 10px;
}

.header h3 {
  font-size: 14px;
  letter-spacing: 2px;
  color: #ccc;
}

.header h1 {
  font-size: 26px;
  letter-spacing: 3px;
  margin-top: 5px;
}

/* NAME */
.name {
  text-align: center;
  margin: 10px 0;
}

.name h2 {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* INFO GRID */
.info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
  font-size: 14px;
}

.info span {
  color: #ccc;
  font-size: 12px;
}

.barcode {
  margin-top: 10px;
  height: 40px;
  background: repeating-linear-gradient(
    90deg,
    #000,
    #000 2px,
    #fff 2px,
    #fff 4px
  );
}
</style>

</head>
<body>

<div class="id-card">

  <!-- LEFT -->
  <div class="left">
    <img src="profile.jpg" alt="ID Photo">
    <div class="id-number">ID NO: 2026-00123</div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="header">
      <h3>REPUBLIC OF THE PHILIPPINES</h3>
      <h1>IDENTIFICATION CARD</h1>
    </div>

    <div class="name">
      <h2>KALIM, JOJO ENQUILLADO</h2>
    </div>

    <div class="info">
      <div><span>First Name</span><br>JOJO</div>
      <div><span>Last Name</span><br>KALIM</div>
      <div><span>Middle Name</span><br>ENQUILLADO</div>
      <div><span>Age</span><br>22</div>
      <div><span>Phone</span><br>0964-953-1290</div>
      <div><span>Birthday</span><br>MAY 1, 2003</div>
      <div><span>Place</span><br>Kabankalan, Philippines</div>
    </div>

    <div class="barcode"></div>

  </div>

</div>

</body>
</html>
