<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student ID</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      color: #fff;
      padding: 15px 20px;
      position: relative;
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
    }

    .nav-links li {
      margin-left: 20px;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
    }

    .menu-toggle {
      display: none;
      font-size: 22px;
      cursor: pointer;
    }

    /* MAIN */
    .main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 60px);
    }

    /* ID CARD */
    .profile {
      width: 340px;
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      text-align: center;
      border: 2px solid #222;
    }

    /* HEADER */
.id-header {
  background: #222;
  color: #fff;
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* LOGO */
.id-header img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #fff;
}

/* TEXT CONTAINER */
.header-text {
  flex: 1;
  text-align: center;
}

.id-header h3 {
  font-size: 13px;
  letter-spacing: 1px;
}

.id-header h2 {
  font-size: 16px;
  margin-top: 3px;
}

    /* PHOTO */
    .profile img.profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      object-fit: cover;
      margin: 15px 0;
      border: 3px solid #222;
    }

    /* NAME */
    .name {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* INFO */
    .info {
      text-align: left;
      padding: 15px;
      font-size: 14px;
    }

    .info p {
      margin: 6px 0;
    }

    .info span {
      font-weight: bold;
    }

    /* EXTRA */
    .extra {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
    }

    .qr {
      width: 70px;
      height: 70px;
      background: repeating-linear-gradient(
        45deg,
        #000,
        #000 4px,
        #fff 4px,
        #fff 8px
      );
    }

    .signature {
      text-align: center;
      font-size: 12px;
    }

    .signature-line {
      border-top: 1px solid #000;
      width: 120px;
      margin: 5px auto;
    }

    /* FOOTER */
    .footer {
      background: #eee;
      padding: 10px;
      font-size: 12px;
    }

    /* 🔥 RESPONSIVE FIX */
    @media (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 60px;
        left: 0;
        background: #111;
        width: 100%;
        flex-direction: column;
        display: none;
        text-align: center;
        z-index: 999; /* 🔥 ensures it's above content */
      }

      .nav-links li {
        margin: 15px 0;
      }

      .menu-toggle {
        display: block;
      }

      .nav-links.active {
        display: flex;
        animation: slideDown 0.3s ease;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">MyProfile</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="#">Home</a></li>
      <li><a href="#">Profile</a></li>
      <li><a href="#">Settings</a></li>
      <li><a href="#">Logout</a></li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- ID CARD -->
    <div class="profile">

<div class="id-header">
  <img src="logo.png" alt="School Logo">

  <div class="header-text">
    <h3>CENTRAL PHILIPPINES STATE UNIVERSITY</h3>
    <h2>BSIT</h2>
  </div>
</div>

      <img src="profile.jpg" class="profile-pic" alt="Profile Picture">

      <div class="name">
        KALIM, JOJO ENQUILLADO
      </div>

      <div class="info">
        <p><span>ID No:</span> 2022-1421-K</p>
        <p><span>Course:</span> BSIT</p>
        <p><span>Year:</span> 4th Year</p>
        <p><span>Phone:</span> 0964-953-1290</p>
        <p><span>Birthday:</span> MAY 1, 2003</p>
        <p><span>Address:</span> Kabankalan, Philippines</p>
      </div>

      <div class="extra">
        <div class="qr"></div>

        <div class="signature">
          <div class="signature-line"></div>
          Authorized Signature
        </div>
      </div>

      <div class="footer">
        Valid Until: 2027
      </div>

    </div>

  </div>

  <script>
    function toggleMenu() {
      document.getElementById("navLinks").classList.toggle("active");
    }
  </script>

</body>
</html>
